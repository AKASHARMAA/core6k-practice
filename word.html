<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Word Practice (Reading)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --text: #1f2937;
            --subtext: #6b7280;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --border: #e5e7eb;
            --input-bg: #ffffff;
            --mic-shadow: rgba(99, 102, 241, 0.4);
        }

        body.dark-mode {
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --success: #34d399;
            --error: #f87171;
            --text: #f1f5f9;
            --subtext: #94a3b8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --input-bg: #334155;
            --mic-shadow: rgba(99, 102, 241, 0.2);
        }

        body {
            font-family: 'Roboto', 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #main-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #upload-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: 2px dashed var(--border);
            color: var(--subtext);
            background-color: var(--card-bg);
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-upload:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: var(--bg);
        }

        input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .filter-group {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: inherit;
            color: var(--text);
            background-color: var(--input-bg);
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px #e0e7ff;
        }

        .toggle-container {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        .toggle-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        #card {
            background: var(--card-bg);
            width: 100%;
            padding: 0;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            position: relative;
            display: none;
        }

        #progress-container {
            width: 100%;
            height: 6px;
            background-color: var(--border);
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            width: 0%;
            transition: width 0.3s ease;
        }

        .content {
            padding: 50px 40px 30px 40px;
            text-align: center;
        }

        h1 {
            font-size: 56px;
            margin: 15px 0 5px 0;
            color: var(--text);
            font-weight: 700;
        }

        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--subtext);
            margin-bottom: 4px;
            display: block;
            font-weight: 600;
        }
        
        #status {
            margin-top: 30px;
            font-weight: 600;
            color: var(--subtext);
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #debug {
            margin-top: 8px;
            font-size: 12px;
            color: #9ca3af;
            min-height: 20px;
            line-height: 1.4;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding-bottom: 40px;
        }

        .btn-nav {
            background: var(--card-bg);
            border: 2px solid var(--border);
            color: var(--subtext);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-nav:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .btn-nav:active {
            transform: translateY(0);
        }

        #btn-mic {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--mic-shadow);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #btn-mic:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        #btn-mic:active {
            transform: scale(0.95);
        }

        #btn-mic.listening {
            background: #ffa726;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 167, 38, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 167, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 167, 38, 0); }
        }

        .keyboard-hint {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 11px;
            color: #d1d5db;
        }

        .active-mode {
            color: var(--success);
            font-weight: 700;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--subtext);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .theme-toggle:hover {
            color: var(--text);
            border-color: var(--text);
        }
    </style>
</head>

<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i> <span>Dark Mode</span>
    </button>

    <div id="main-container">
        <div id="upload-card">
            <div class="file-input-wrapper">
                <button class="btn-upload"><i class="fas fa-upload"></i> Upload CSV File</button>
                <input type="file" id="csv-file" accept=".csv,.txt,.tsv" />
            </div>
            <div class="filter-group">
                <label for="pos-filter" style="font-size: 14px; font-weight: 500; color: #64748b;">Filter by POS:</label>
                <select id="pos-filter" disabled>
                    <option value="all">All</option>
                </select>
            </div>

            <div class="toggle-container">
                <label class="toggle-switch">
                    <input type="checkbox" id="continuous-toggle">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="toggle-label-text">Continuous Mode</span>
            </div>

            <div id="file-info" style="margin-top: 10px; font-size: 12px; color: #94a3b8;"></div>
        </div>

        <div id="card">
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div class="content">
                <span class="label">Target Word</span>
                <h1 id="target-word">...</h1>
                <div id="status"><i class="fas fa-microphone"></i> Press Space to Read</div>
                <div id="debug"></div>
            </div>
            <div class="controls">
                <button class="btn-nav" onclick="prevCard()" title="Previous (Left Arrow)"><i class="fas fa-arrow-left"></i></button>
                <button id="btn-mic" onclick="togglePlayListen()" title="Start/Stop (Space)"><i class="fas fa-microphone"></i></button>
                <button class="btn-nav" onclick="nextCard()" title="Next (Right Arrow)"><i class="fas fa-arrow-right"></i></button>
            </div>
            <div class="keyboard-hint">Use Arrow Keys & Space</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js"></script>
    <script>
        let allSentences = [];
        let filteredSentences = [];
        let currentIndex = 0;
        const POS_COLUMN_INDEX = 8;
        let isContinuous = false;

        document.getElementById('continuous-toggle').addEventListener('change', (e) => {
            isContinuous = e.target.checked;
            const label = document.getElementById('toggle-label-text');
            if (isContinuous) {
                label.classList.add('active-mode');
                label.innerText = "Continuous Mode: ON";
            } else {
                label.classList.remove('active-mode');
                label.innerText = "Continuous Mode";
            }
        });

        document.getElementById('csv-file').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-info').innerText = "Loading: " + file.name;
            const reader = new FileReader();
            reader.onload = function (e) {
                parseCSV(e.target.result);
            };
            reader.readAsText(file);
        });

        function parseCSV(content) {
            const lines = content.split('\n');
            allSentences = [];
            const posSet = new Set();

            lines.forEach(line => {
                if (!line.trim()) return;
                const cols = line.split('\t');
                if (cols.length < 4) return;

                const word = cols[0] ? cols[0].trim() : "";
                // Capture columns 1 and 2 just in case they contain the hiragana reading from Anki decks
                const col1 = cols[1] ? cols[1].trim() : "";
                const col2 = cols[2] ? cols[2].trim() : ""; 
                const word_meaning = cols[3] ? cols[3].trim() : "";
                const pos = (cols.length > POS_COLUMN_INDEX && cols[POS_COLUMN_INDEX]) ? cols[POS_COLUMN_INDEX].trim() : "Unknown";

                allSentences.push({ word, col1, col2, word_meaning, pos });
                if (pos) posSet.add(pos);
            });

            document.getElementById('file-info').innerText = `Loaded ${allSentences.length} words.`;
            populatePOSFilter(Array.from(posSet).sort());
            
            const lastPos = localStorage.getItem('japanese_practice_last_pos') || "all";
            document.getElementById('pos-filter').value = lastPos;
            filterSentences(lastPos);
            document.getElementById('card').style.display = 'block';
        }

        function saveProgress(pos, index) {
            localStorage.setItem(`japanese_practice_progress_${pos}`, index);
        }

        function loadProgress(pos) {
            return parseInt(localStorage.getItem(`japanese_practice_progress_${pos}`)) || 0;
        }

        function populatePOSFilter(posList) {
            const select = document.getElementById('pos-filter');
            select.innerHTML = '<option value="all">All Parts of Speech</option>';
            posList.forEach(pos => {
                const option = document.createElement('option');
                option.value = pos;
                option.innerText = pos;
                select.appendChild(option);
            });
            select.disabled = false;
        }

        document.getElementById('pos-filter').addEventListener('change', (e) => {
            filterSentences(e.target.value);
        });

        function filterSentences(pos) {
            localStorage.setItem('japanese_practice_last_pos', pos);
            if (pos === "all") filteredSentences = [...allSentences];
            else filteredSentences = allSentences.filter(s => s.pos === pos);

            currentIndex = loadProgress(pos);
            if (currentIndex >= filteredSentences.length) currentIndex = 0;
            updateDisplay();
            document.getElementById('pos-filter').blur();
        }

        // --- KUROMOJI ---
        let tokenizer = null;
        let isDictLoaded = false;

        function initKuromoji() {
            const fileInfo = document.getElementById('file-info');
            const startBtn = document.getElementById('btn-mic');

            fileInfo.innerHTML = "<b>Loading AI Engine (~1.6MB)... Please Wait.</b>";
            fileInfo.style.color = "blue";
            startBtn.disabled = true;

            (function () {
                const originalOpen = XMLHttpRequest.prototype.open;
                XMLHttpRequest.prototype.open = function (method, url, async, user, password) {
                    if (typeof url === 'string' && url.includes('raw.githubusercontent.com')) {
                        const cleanPath = url.split('raw.githubusercontent.com')[1];
                        url = "https://raw.githubusercontent.com" + cleanPath;
                    }
                    return originalOpen.apply(this, arguments);
                };
            })();

            kuromoji.builder({ dicPath: "//raw.githubusercontent.com/takuyaa/kuromoji.js/master/dict/" }).build(function (err, _tokenizer) {
                if (err) {
                    fileInfo.innerHTML = `Error: Dictionary Load Failed.`;
                    return;
                }
                tokenizer = _tokenizer;
                isDictLoaded = true;
                startBtn.disabled = false;
                fileInfo.style.color = "green";
                if (allSentences.length > 0) fileInfo.innerHTML = `Loaded ${allSentences.length} words. <b>Engine Ready.</b>`;
                else fileInfo.innerHTML = "<b>Engine Ready.</b> Please Upload CSV.";
                
                // Refresh display to show the AI-generated reading if a card is open
                updateDisplay();
            });
        }

        function katakanaToHiragana(src) {
            if(!src) return "";
            return src.replace(/[\u30a1-\u30f6]/g, function (match) {
                var chr = match.charCodeAt(0) - 0x60;
                return String.fromCharCode(chr);
            });
        }

        function getOfficialReading(text) {
            if (!tokenizer) return null;
            const tokens = tokenizer.tokenize(text);
            let reading = tokens.map(t => t.reading ? t.reading : t.surface_form).join("");
            return katakanaToHiragana(reading);
        }

        initKuromoji();

        // --- ASR LOGIC ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;
        let isManualStop = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = false;
            recognition.maxAlternatives = 10;
            setupRecognitionHandlers();
        } else {
            alert("Web Speech API not supported. Please use Chrome/Edge.");
        }

        function setupRecognitionHandlers() {
            recognition.onresult = function (event) {
                try {
                    const resultsList = event.results[0];
                    const spokenRawAll = resultsList[0].transcript; 

                    if (spokenRawAll.toLowerCase().includes("next")) {
                        document.getElementById('status').innerText = "Skipping (Voice Command)...";
                        isManualStop = true;
                        recognition.stop();
                        setTimeout(() => {
                            nextCard();
                            if (isContinuous) startListening();
                        }, 500);
                        return;
                    }

                    const s = filteredSentences[currentIndex];
                    const targetWordRaw = s.word.replace(/[。、！？\s]/g, '');
                    
                    // Generate AI Reading of the target word
                    const targetWordReading = getOfficialReading(targetWordRaw) || targetWordRaw;

                    // Build an array of valid targets (Raw, AI Reading, and CSV Fallback Columns)
                    const validTargets = [
                        katakanaToHiragana(targetWordRaw),
                        katakanaToHiragana(targetWordReading),
                        s.col1 ? katakanaToHiragana(s.col1.replace(/[。、！？\s]/g, '')) : "",
                        s.col2 ? katakanaToHiragana(s.col2.replace(/[。、！？\s]/g, '')) : ""
                    ].filter(Boolean); // removes empty strings

                    let matchFound = false;
                    let heardLog = [];
                    let maxSim = 0.0;
                    let bestMatchDebug = "";

                    // Cross-reference every spoken variation against every target variation
                    for (let i = 0; i < resultsList.length; i++) {
                        let spokenRaw = resultsList[i].transcript;
                        let spokenClean = normalizeNumbers(spokenRaw.replace(/[。、！？\s]/g, ''));
                        
                        // Generate AI Reading of what you just said
                        let spokenReading = getOfficialReading(spokenClean) || spokenClean;

                        let spokenVariations = [
                            katakanaToHiragana(spokenClean),
                            katakanaToHiragana(spokenReading)
                        ];

                        heardLog.push(spokenClean);

                        for (let sv of spokenVariations) {
                            for (let tv of validTargets) {
                                let sim = getSimilarity(sv, tv);
                                if (sim > maxSim) {
                                    maxSim = sim;
                                    bestMatchDebug = `Compared: [${sv}] vs [${tv}]`;
                                }
                                if (sim >= 0.90) {
                                    matchFound = true;
                                    break;
                                }
                            }
                            if(matchFound) break;
                        }
                        if(matchFound) break;
                    }

                    isListening = false;
                    document.getElementById('btn-mic').classList.remove('listening');

                    if (matchFound) {
                        document.getElementById('status').innerHTML = '<i class="fas fa-check-circle"></i> Perfect!';
                        document.getElementById('status').style.color = "#10b981";
                        document.getElementById('debug').innerText = "Matched: " + heardLog[0] + " (100%)";

                        if (isContinuous) {
                            setTimeout(() => {
                                nextCard();
                                startListening();
                            }, 1500);
                        } else {
                            setTimeout(() => nextCard(), 1000);
                        }
                    } else {
                        document.getElementById('status').innerHTML = '<i class="fas fa-times-circle"></i> Try again';
                        document.getElementById('status').style.color = "#ef4444";
                        
                        // Show exactly what the engine tried to compare so you aren't left guessing
                        document.getElementById('debug').innerHTML = `Heard: ${heardLog[0]}<br><span style="color:#6b7280">${bestMatchDebug} (Sim: ${(maxSim * 100).toFixed(0)}%)</span>`;

                        if (isContinuous) {
                            setTimeout(() => { startListening(); }, 2000);
                        }
                    }
                } catch (e) {
                    console.error(e);
                    document.getElementById('debug').innerText = "ERROR: " + e.message;
                    isListening = false;
                    document.getElementById('btn-mic').classList.remove('listening');
                }
            };

            recognition.onend = function () {
                isListening = false;
                document.getElementById('btn-mic').classList.remove('listening');

                if (isContinuous && !isManualStop) {
                    document.getElementById('status').innerText = "Restarting...";
                    setTimeout(() => {
                        if (isContinuous && !isListening && !isManualStop) startListening();
                    }, 1500);
                }
            };

            recognition.onerror = function (event) {
                if (event.error === 'no-speech' && isContinuous) {
                    document.getElementById('status').innerText = "No speech detected. Listening again...";
                    setTimeout(() => startListening(), 1000);
                    return;
                }
                document.getElementById('status').innerText = "Error: " + event.error;
                isListening = false;
                document.getElementById('btn-mic').classList.remove('listening');
            };
        }

        // --- HELPERS ---
        function normalizeNumbers(text) {
            return text.replace(/0/g, '〇').replace(/1/g, '一').replace(/2/g, '二')
                .replace(/3/g, '三').replace(/4/g, '四').replace(/5/g, '五')
                .replace(/6/g, '六').replace(/7/g, '七').replace(/8/g, '八')
                .replace(/9/g, '九');
        }

        function getLevenshteinDistance(a, b) {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) == a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
                    else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                }
            }
            return matrix[b.length][a.length];
        }

        function getSimilarity(a, b) {
            if (a.length === 0 && b.length === 0) return 1.0;
            if (a.length === 0 || b.length === 0) return 0.0;
            const dist = getLevenshteinDistance(a, b);
            const maxLen = Math.max(a.length, b.length);
            return 1.0 - (dist / maxLen);
        }

        // --- UI HELPERS ---
        function updateDisplay() {
            if (filteredSentences.length === 0) return;
            if (currentIndex >= filteredSentences.length) currentIndex = filteredSentences.length - 1;
            if (currentIndex < 0) currentIndex = 0;

            const progress = ((currentIndex + 1) / filteredSentences.length) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";

            const s = filteredSentences[currentIndex];
            document.getElementById('target-word').innerText = s.word;        
            resetStatus();
        }

        function resetStatus() {
            document.getElementById('status').innerHTML = '<i class="fas fa-microphone"></i> Press Space to Read';
            document.getElementById('status').style.color = "#6b7280";
            document.getElementById('debug').innerText = "";
            document.getElementById('btn-mic').classList.remove('listening');
        }

        function togglePlayListen() {
            if (isListening) {
                isManualStop = true;
                recognition.stop();
                resetStatus();
                return;
            }
            isManualStop = false;
            startListening();
        }

        function startListening() {
            if (!recognition) return;
            isListening = true;
            document.getElementById('status').innerText = "Listening...";
            document.getElementById('status').style.color = "#e67e22";
            document.getElementById('btn-mic').classList.add('listening');
            try { recognition.start(); } catch (e) { }
        }

        function nextCard() {
            if (currentIndex < filteredSentences.length - 1) {
                currentIndex++;
                saveProgress(document.getElementById('pos-filter').value, currentIndex);
                updateDisplay();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                saveProgress(document.getElementById('pos-filter').value, currentIndex);
                updateDisplay();
            }
        }

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') { event.preventDefault(); togglePlayListen(); }
            else if (event.code === 'ArrowRight') nextCard();
            else if (event.code === 'ArrowLeft') prevCard();
        });

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('japanese_practice_theme', isDark ? 'dark' : 'light');
            updateThemeUI(isDark);
        }

        function updateThemeUI(isDark) {
            const btn = document.querySelector('.theme-toggle');
            if (isDark) {
                btn.innerHTML = '<i class="fas fa-sun"></i> <span>Light Mode</span>';
            } else {
                btn.innerHTML = '<i class="fas fa-moon"></i> <span>Dark Mode</span>';
            }
        }

        (function initTheme() {
            const savedTheme = localStorage.getItem('japanese_practice_theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark-mode');
                updateThemeUI(true);
            } else {
                updateThemeUI(false);
            }
        })();
    </script>
</body>
</html>
